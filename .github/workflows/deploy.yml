name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/dota2Draft
            git pull origin main
            # Stamp a fresh version token so clients can detect the new deploy and prompt users to refresh.
            echo "$(date +%s)-$(openssl rand -hex 4)" > server/.version
            curl -s -X POST http://localhost:3000/api/deploy-status \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
              -d '{"deploying":true}' || true
            cd docker/prod
            docker compose up -d --build --force-recreate
            docker image prune -f
            sleep 5
            curl -s -X POST http://localhost:3000/api/deploy-status \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
              -d '{"deploying":false}' || true
