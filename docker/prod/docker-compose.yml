services:
  draft:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      # HTTP router (dota.lv)
      - "traefik.http.routers.draft-http.rule=Host(`dota.lv`)"
      - "traefik.http.routers.draft-http.entrypoints=http"
      - "traefik.http.routers.draft-http.service=draft"
      # HTTPS router (dota.lv)
      - "traefik.http.routers.draft.rule=Host(`dota.lv`)"
      - "traefik.http.routers.draft.entrypoints=https"
      - "traefik.http.routers.draft.tls=true"
      - "traefik.http.routers.draft.tls.certresolver=letsencrypt"
      - "traefik.http.routers.draft.service=draft"
      # Redirect dota2.lv -> dota.lv (preserves path + scheme upgrade to https)
      - "traefik.http.middlewares.draft-redirect-old.redirectregex.regex=^https?://dota2\\.lv(.*)"
      - "traefik.http.middlewares.draft-redirect-old.redirectregex.replacement=https://dota.lv$${1}"
      - "traefik.http.middlewares.draft-redirect-old.redirectregex.permanent=true"
      - "traefik.http.routers.draft-old-http.rule=Host(`dota2.lv`)"
      - "traefik.http.routers.draft-old-http.entrypoints=http"
      - "traefik.http.routers.draft-old-http.middlewares=draft-redirect-old"
      - "traefik.http.routers.draft-old-http.service=draft"
      - "traefik.http.routers.draft-old.rule=Host(`dota2.lv`)"
      - "traefik.http.routers.draft-old.entrypoints=https"
      - "traefik.http.routers.draft-old.tls=true"
      - "traefik.http.routers.draft-old.tls.certresolver=letsencrypt"
      - "traefik.http.routers.draft-old.middlewares=draft-redirect-old"
      - "traefik.http.routers.draft-old.service=draft"
      # Service
      - "traefik.http.services.draft.loadbalancer.server.port=3001"
    container_name: draft
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile
    image: draft_image
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://draft:draft@draft-db:5432/draft
      - STEAM_API_KEY=${STEAM_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_INTERNAL_URL=http://draft-discordbot:3030
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - REQUEST_LOG_DISABLED=${REQUEST_LOG_DISABLED:-false}
    volumes:
      - draft_uploads:/app/uploads
    depends_on:
      draft-db:
        condition: service_healthy
    networks:
      frontend:
      draft-internal:

  draft-lobbybot:
    container_name: draft-lobbybot
    build:
      context: ../../lobbybot
      dockerfile: Dockerfile
    image: draft_lobbybot_image
    restart: always
    environment:
      - WS_URL=ws://draft:3001/ws/lobbybot
      - BOT_SERVICE_TOKEN=${BOT_SERVICE_TOKEN}
      - GOLANG_PROTOBUF_REGISTRATION_CONFLICT=warn
    depends_on:
      - draft
    networks:
      draft-internal:

  draft-discordbot:
    container_name: draft-discordbot
    build:
      context: ../../discord
      dockerfile: Dockerfile
    image: draft_discordbot_image
    restart: always
    environment:
      - NODE_ENV=production
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - API_BASE_URL=http://draft:3001
      - DATABASE_URL=postgresql://draft:draft@draft-db:5432/draft
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - INTERNAL_PORT=3030
      - ENABLE_GUILD_MEMBERS_INTENT=${ENABLE_GUILD_MEMBERS_INTENT:-false}
    depends_on:
      draft-db:
        condition: service_healthy
      draft:
        condition: service_started
    networks:
      draft-internal:

  draft-db:
    image: postgres:16-alpine
    container_name: draft-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: draft
      POSTGRES_USER: draft
      POSTGRES_PASSWORD: draft
    volumes:
      - draft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U draft"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      draft-internal:

volumes:
  draft_pgdata:
  draft_uploads:

networks:
  frontend:
    name: frontend
    external: true
  draft-internal:
