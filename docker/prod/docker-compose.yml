services:
  draft:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      # HTTP router
      - "traefik.http.routers.draft-http.rule=Host(`dota2.lv`)"
      - "traefik.http.routers.draft-http.entrypoints=http"
      - "traefik.http.routers.draft-http.service=draft"
      # HTTPS router
      - "traefik.http.routers.draft.rule=Host(`dota2.lv`)"
      - "traefik.http.routers.draft.entrypoints=https"
      - "traefik.http.routers.draft.tls=true"
      - "traefik.http.routers.draft.tls.certresolver=letsencrypt"
      - "traefik.http.routers.draft.service=draft"
      # Service
      - "traefik.http.services.draft.loadbalancer.server.port=3001"
    container_name: draft
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile
    image: draft_image
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://draft:draft@draft-db:5432/draft
      - STEAM_API_KEY=${STEAM_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
    volumes:
      - draft_uploads:/app/uploads
    depends_on:
      draft-db:
        condition: service_healthy
    networks:
      frontend:
      draft-internal:

  draft-db:
    image: postgres:16-alpine
    container_name: draft-db
    restart: always
    environment:
      POSTGRES_DB: draft
      POSTGRES_USER: draft
      POSTGRES_PASSWORD: draft
    volumes:
      - draft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U draft"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      draft-internal:

volumes:
  draft_pgdata:
  draft_uploads:

networks:
  frontend:
    name: frontend
    external: true
  draft-internal:
